version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bcs_tickets
    volumes:
      - ./server/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/bcs_tickets
      - JWT_SECRET=change-this-secret
      - REGISTER_SECRET=change-me
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      - db
    restart: unless-stopped
